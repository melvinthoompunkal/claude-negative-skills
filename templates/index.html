<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Negative Skills — Stop Claude doing things you hate</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.4rem;
        }

        .sub {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.4rem;
            margin-top: 1.4rem;
        }

        input[type=text],
        textarea,
        select {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #f0f0f0;
            padding: 0.7rem 0.9rem;
            font-size: 0.95rem;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #555;
        }

        .hint {
            font-size: 0.78rem;
            color: #666;
            margin-top: 0.3rem;
        }

        button {
            margin-top: 2rem;
            width: 100%;
            background: #e03e3e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #c93232;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🚫 Negative Skills</h1>
        <p class="sub">Tell us what Claude does that drives you crazy. We'll turn it into a constraint file you can
            install directly.</p>

        <form action="/generate" method="post">

            <label>What is this skill for?</label>
            <input type="text" name="context" placeholder="e.g. coding help, writing emails, customer support"
                required />

            <label>What has Claude done that annoyed you?</label>
            <textarea name="bad_behaviors"
                placeholder="One per line:&#10;Adds unnecessary comments everywhere&#10;Gives 3 paragraphs when I want 1 line"
                required></textarea>
            <p class="hint">One behavior per line.</p>

            <label>Topics Claude should never bring up</label>
            <textarea name="forbidden_topics"
                placeholder="One per line (optional):&#10;Suggesting I rewrite in Rust&#10;Mentioning TypeScript"></textarea>
            <p class="hint">Leave blank if none.</p>

            <label>Style things you hate</label>
            <input type="text" name="style_hates" placeholder="e.g. bullet points, long disclaimers, formal tone" />

            <label>How strict should these rules be?</label>
            <select name="severity">
                <option value="moderate" selected>Moderate</option>
                <option value="strict">Strict</option>
                <option value="soft">Soft</option>
            </select>

            <button type="submit">Generate my Negative Skill →</button>
        </form>
    </div>
</body>

</html>
